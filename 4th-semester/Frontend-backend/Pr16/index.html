<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заметки (App Shell)</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4285f4">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/x-icon" href="icons/favicon.ico">

    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
</head>
<body>
<header>
    <h1>Мои <span class="no-break">Заметки</span></h1>
    <nav class="tabs is-center">
        <button id="home-btn" class="tab active col-6">Главная</button>
        <button id="about-btn" class="tab col-6">О приложении</button>
    </nav>
</header>

<main id="app-content" class="container" style="margin-top: 2rem;">
</main>

<footer class="is-center" style="margin-top: 3rem;">
    <button id="enable-push" class="button success">Включить уведомления</button>
    <button id="disable-push" class="button error" style="display: none;">Отключить уведомления</button>
</footer>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="app.js"></script>
</body>
</html>
